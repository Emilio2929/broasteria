<div class="staff-wrapper">
  <div class="orange-wave"></div>

  <div class="login-card-staff animate-in">
    <div class="card-top-accent"></div>
    <h2 class="brand-title">VERIFICAR CÓDIGO</h2>
    
    <p class="text-center" style="margin-bottom: 2rem;">
      Hemos enviado un código de 6 dígitos a tu correo.
      <br>
      Ingrésalo a continuación.
    </p>
    <form (ngSubmit)="validarToken()" class="staff-form">
      <div class="mb-5 text-center">
        <div class="token-input-wrapper">
          <input 
            type="text" 
            class="form-control-token" 
            [class.input-error]="errorInput"
            [(ngModel)]="token" 
            name="token" 
            maxlength="6" 
            placeholder="000000" 
            required 
            autocomplete="off"
            [disabled]="cargando"
          >
        </div>
      </div>

      <div class="d-flex flex-column gap-3">
        <button type="submit" class="btn-staff" [disabled]="cargando || token.length < 6">
            <span *ngIf="!cargando">VERIFICAR CÓDIGO</span>
            <span *ngIf="cargando"><i class="bi bi-hourglass-split"></i> Verificando...</span>
        </button>
        <button type="button" class="btn-ghost" (click)="volver($event)">
            &leftarrow; Volver
        </button>
      </div>
    </form>
  </div>
  
</div> 

<div *ngIf="mensajeError" class="toast-simple error animate-toast">
    <i class="bi bi-x-circle-fill"></i> 
    <span>{{ mensajeError }}</span>
</div>

<div *ngIf="mensajeExito" class="toast-simple success animate-toast">
    <i class="bi bi-check-circle-fill"></i> 
    <span>{{ mensajeExito }}</span>
</div>
