<div class="staff-wrapper">
  
  <div class="orange-wave"></div>

  <a href="#" class="btn-back" (click)="volver($event)">
    <i class="bi bi-arrow-left-circle-fill"></i>
    <span>Volver</span>
  </a>

  <div class="login-card-staff animate-in">
    
    <div class="card-top-accent"></div>

    <img src="logo.png" alt="Logo D'licias" class="brand-logo">

    <h1 class="brand-title">INGRESO EMPLEADO</h1>
    <p class="login-subtitle">Introduce tus credenciales</p>

    <form (ngSubmit)="ingresar()" #loginForm="ngForm" novalidate class="staff-form">
      
      <div class="mb-4 text-start">
        <label for="usuario" class="form-label fw-bold small text-uppercase text-muted">Usuario</label>
        <div class="input-group-custom">
          <span class="input-icon"><i class="bi bi-person-fill"></i></span>
          <input
            type="text"
            class="form-control-staff"
            id="usuario"
            name="usuarioLogin"
            [(ngModel)]="usuarioLogin"
            placeholder="Ej: cajero01"
            required
            [class.is-invalid]="loginForm.submitted && !usuarioLogin"
          />
        </div>
        <div class="invalid-feedback d-block" *ngIf="loginForm.submitted && !usuarioLogin">
          * El usuario es requerido
        </div>
      </div>

      <div class="mb-4 text-start">
        <label for="contrasena" class="form-label fw-bold small text-uppercase text-muted">Contraseña</label>
        <div class="input-group-custom">
          <span class="input-icon"><i class="bi bi-key-fill"></i></span>
          <input
            #inputContrasena
            type="password"
            class="form-control-staff"
            id="contrasena"
            name="contrasenaHash"
            [(ngModel)]="contrasenaHash"
            placeholder="••••••"
            required
            [class.is-invalid]="loginForm.submitted && !contrasenaHash"
          />
          <span class="password-toggle" (click)="alternarContrasena()">
            <i #iconoOjo class="bi bi-eye"></i>
          </span>
        </div>
        <div class="invalid-feedback d-block" *ngIf="loginForm.submitted && !contrasenaHash">
          * La contraseña es requerida
        </div>
      </div>

      <div class="mt-5">
        <button type="submit" class="btn-staff" [disabled]="cargando">
          <span *ngIf="!cargando">INGRESAR</span>
          <span *ngIf="cargando"><i class="bi bi-hourglass-split"></i> Validando...</span>
        </button>
      </div>

    </form>

    <div class="system-tag">
      © 2025 D'Licias Fast Food. Sistema Interno.
    </div>

  </div>

</div>

<div class="toast-custom" *ngIf="mostrarToast" 
     [ngClass]="{
       'toast-success': toastTipo === 'success', 
       'toast-error': toastTipo === 'error',
       'toast-closing': closingToast
     }">
  <div class="toast-icon">
    <i class="bi" [class.bi-check-circle-fill]="toastTipo === 'success'" [class.bi-x-circle-fill]="toastTipo === 'error'"></i>
  </div>
  <div class="toast-body">
    <span class="toast-title">{{ toastTitulo }}</span>
    <span class="toast-message">{{ toastMensaje }}</span>
  </div>
  <button class="toast-close" (click)="cerrarToast()">
    <i class="bi bi-x"></i>
  </button>
</div>
