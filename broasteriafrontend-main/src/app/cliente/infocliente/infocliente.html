<div class="main-wrapper">

  <div class="orange-header-bg"></div>

  <nav class="custom-navbar d-flex justify-content-end align-items-center p-4 position-relative" style="z-index: 10;">
    <div class="nav-links d-flex gap-4 align-items-center">
      <a href="#" class="nav-item" (click)="inicio($event)">INICIO</a>
      <a href="#" class="nav-item" (click)="carrito($event)"><i class="bi bi-cart-fill"></i> CARRITO</a>
      <a href="#" class="nav-item" (click)="historial($event)">HISTORIAL</a>
      <div class="profile-btn" (click)="abrirPerfil()"><i class="bi-person-fill fs-5"></i></div>
    </div>
  </nav>

  <div class="container content-container">
    <h1 class="page-title">Mi Perfil</h1>

    <div class="row justify-content-center">
      <div class="col-lg-8 col-md-10">
        <div class="profile-card">
          
          <div class="text-center mb-4">
            <div class="big-avatar"><i class="bi bi-person"></i></div>
            <h3 class="fw-bold m-0">{{ cliente.nombre }} {{ cliente.apellido }}</h3>
            <p class="text-muted small text-uppercase ls-1">Cliente Registrado</p>
            
            <button class="btn-action btn-edit mt-2" [class.active]="modoEdicion" (click)="activarEdicion()" [disabled]="guardando">
              <i class="bi" [ngClass]="modoEdicion ? 'bi-x-lg' : 'bi-pencil-fill'"></i>
              {{ modoEdicion ? 'Cancelar Edición' : 'Editar Datos' }}
            </button>
          </div>

          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-person-fill me-2 text-warning"></i>Nombres</label>
              <div>
                <input #nombreInput type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       [value]="cliente.nombre" [readonly]="!modoEdicion">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-person-badge-fill me-2 text-warning"></i>Apellidos</label>
              <div>
                <input #apellidoInput type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       [value]="cliente.apellido" [readonly]="!modoEdicion">
              </div>
            </div>
            
            <div class="col-12">
               <label class="form-label"><i class="bi bi-envelope-at-fill me-2 text-warning"></i>Correo Electrónico</label>
               <div>
                 <input type="email" class="custom-input bg-light" [value]="cliente.correo" readonly>
               </div>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-telephone-fill me-2 text-warning"></i>Teléfono</label>
              <div>
                <input #telefonoInput type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       [value]="cliente.telefono" [readonly]="!modoEdicion">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label"><i class="bi bi-card-text me-2 text-warning"></i>Documento</label>
              <div>
                <input #documentoInput type="text" class="custom-input bg-light" [value]="cliente.numeroDocumento" readonly>
              </div>
            </div>

            <div class="col-12 border-top pt-3 mt-3">
              <label class="form-label text-warning small fw-bold"><i class="bi bi-geo-alt-fill me-2"></i>DIRECCIÓN DE ENTREGA</label>
              <div class="mb-3">
                <input #direccionInput type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       [value]="cliente.direccion" [readonly]="!modoEdicion">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label"><i class="bi bi-signpost-split-fill me-2 text-warning"></i>Referencia</label>
              <div>
                <input #referenciaInput type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       placeholder="Referencia" [value]="cliente.referencia || ''" [readonly]="!modoEdicion">
              </div>
            </div>

            <div class="col-12">
              <label class="form-label"><i class="bi bi-building-fill me-2 text-warning"></i>Dirección Secundaria</label>
              <div>
                <input #direccion2Input type="text" class="custom-input" [class.input-editable]="modoEdicion" [class.input-locked]="!modoEdicion"
                       placeholder="Opcional" [value]="cliente.direccion2 || ''" [readonly]="!modoEdicion">
              </div>
            </div>

            <div class="col-12 mt-4 pt-3 border-top">
                <button class="btn btn-outline-dark w-100 rounded-pill" (click)="abrirModalPassword()">
                    <i class="bi bi-shield-lock me-2"></i> Cambiar Contraseña
                </button>
            </div>

          </div>

          <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
            <button class="btn-action btn-delete-account" [disabled]="guardando" (click)="confirmarEliminacion()">
              <i class="bi bi-trash"></i> Eliminar Cuenta
            </button>

            <div class="d-flex gap-2">
              <button class="btn-action btn-logout" *ngIf="!modoEdicion" (click)="abrirModalLogout()">
                <i class="bi bi-box-arrow-right"></i> Salir
              </button>

              <button class="btn-action btn-save" *ngIf="modoEdicion" (click)="guardarCambios()" [disabled]="guardando">
                <i class="bi bi-check-lg"></i> Guardar
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" *ngIf="mostrarModalEliminar" (click)="cancelarEliminacion()"></div>
  <div class="custom-modal text-center" *ngIf="mostrarModalEliminar">
    <div class="mb-3 text-danger"><i class="bi bi-exclamation-octagon-fill" style="font-size: 3rem;"></i></div>
    <h4 class="fw-bold mb-2">¿Eliminar Cuenta?</h4>
    <p class="text-secondary mb-4">Perderás tu historial. No se puede deshacer.</p>
    <div class="d-flex gap-3 justify-content-center">
      <button class="btn btn-secondary rounded-pill px-4" (click)="cancelarEliminacion()">Cancelar</button>
      <button class="btn btn-danger rounded-pill px-4" (click)="ejecutarEliminarCuenta()">Sí, Eliminar</button>
    </div>
  </div>

  <div class="modal-backdrop" *ngIf="mostrarModalLogout" (click)="cancelarLogout()"></div>
  <div class="custom-modal text-center" *ngIf="mostrarModalLogout">
    <div class="mb-3 text-dark"><i class="bi bi-box-arrow-right" style="font-size: 3rem;"></i></div>
    <h4 class="fw-bold mb-2">¿Cerrar Sesión?</h4>
    <p class="text-secondary mb-4">Tendrás que ingresar tus datos para pedir.</p>
    <div class="d-flex gap-3 justify-content-center">
      <button class="btn btn-light mb-3 border rounded-pill px-4" (click)="cancelarLogout()">Cancelar</button>
      <button class="btn btn-dark mb-3 rounded-pill px-4" (click)="confirmarLogout()">Sí, Salir</button>
    </div>
  </div>

  <div class="modal-backdrop" *ngIf="mostrarModalPassword" (click)="cancelarPassword()"></div>
  <div class="custom-modal p-4" *ngIf="mostrarModalPassword" style="max-width: 400px;">
    <div class="text-center mb-3">
        <i class="bi bi-shield-lock-fill fs-1 text-warning"></i>
    </div>
    <h4 class="fw-bold mb-3 text-center">Seguridad</h4>
    
    <div class="mb-3">
        <label class="small text-muted mb-1 fw-bold">Contraseña Actual</label>
        <div class="input-group">
            <input [type]="mostrarPassActual ? 'text' : 'password'" 
                   class="form-control rounded-start-pill border-end-0" 
                   [(ngModel)]="passActual" 
                   placeholder="Tu clave actual">
            <span class="input-group-text bg-white border-start-0 rounded-end-pill" 
                  style="cursor: pointer;"
                  (click)="togglePassActual()">
                <i class="bi" [ngClass]="mostrarPassActual ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </span>
        </div>
    </div>

    <div class="mb-3">
        <label class="small text-muted mb-1 fw-bold">Nueva Contraseña</label>
        <div class="input-group">
            <input [type]="mostrarPassNueva ? 'text' : 'password'" 
                   class="form-control rounded-start-pill border-end-0" 
                   [(ngModel)]="passNueva" 
                   placeholder="Mínimo 8 caracteres, Mayús, núm, símb">
            <span class="input-group-text bg-white border-start-0 rounded-end-pill" 
                  style="cursor: pointer;"
                  (click)="togglePassNueva()">
                <i class="bi" [ngClass]="mostrarPassNueva ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </span>
        </div>
    </div>

    <div class="mb-4">
        <label class="small text-muted mb-1 fw-bold">Confirmar Nueva Contraseña</label>
        <div class="input-group">
            <input [type]="mostrarPassConfirmar ? 'text' : 'password'" 
                   class="form-control rounded-start-pill border-end-0" 
                   [(ngModel)]="passConfirmar" 
                   placeholder="Repite la nueva clave">
            <span class="input-group-text bg-white border-start-0 rounded-end-pill" 
                  style="cursor: pointer;"
                  (click)="togglePassConfirmar()">
                <i class="bi" [ngClass]="mostrarPassConfirmar ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </span>
        </div>
    </div>

    <div class="d-flex gap-2 justify-content-center">
      <button class="btn btn-light border rounded-pill px-4" (click)="cancelarPassword()">Cancelar</button>
      <button class="btn btn-dark rounded-pill px-4" (click)="ejecutarCambioPassword()">Actualizar</button>
    </div>
  </div>

</div>
