<div class="main-login-wrapper">

  <div class="bg-shape-top"></div>
  <div class="bg-shape-bottom"></div>
  <img src="logo.png" class="floating-decoration" alt="decoration">

  <a href="#" class="btn-back" (click)="volver($event)">
    <i class="bi bi-arrow-left"></i> Volver
  </a>

  <div class="container d-flex justify-content-center align-items-center min-vh-100 position-relative" style="z-index: 2;">
    
    <div class="login-card">
      <div class="row g-0">
        
        <div class="col-md-5 d-none d-md-flex flex-column justify-content-center align-items-center side-panel">
          <img src="logo.png" alt="Logo" class="login-logo floating-anim mb-3">
          <h4 class="text-white fw-bold text-center px-3" style="z-index: 2;">¡Hola de nuevo!</h4>
          <p class="text-white-50 text-center small px-4" style="z-index: 2;">Tus antojos favoritos te están esperando.</p>
        </div>

        <div class="col-md-7 p-5 bg-white rounded-end-card">
          
          <div class="text-center mb-4 d-md-none">
            <img src="logo.png" width="80" alt="Logo">
          </div>

          <h2 class="fw-bold text-dark mb-1">Iniciar <span style="color: #FF5E00;">Sesión</span></h2>
          <p class="text-muted small mb-4">Ingresa tus datos para continuar</p>

          <form (ngSubmit)="iniciarSesion()">
            
            <div class="mb-3">
              <label class="form-label fw-bold small text-secondary ps-3">Correo Electrónico</label>
              <div class="input-group">
                <span class="input-group-text rounded-start-pill ps-3">
                  <i class="bi bi-envelope-fill text-warning"></i>
                </span>
                <input 
                  type="email" 
                  class="form-control rounded-end-pill py-2" 
                  placeholder="ejemplo@correo.com"
                  [(ngModel)]="correo" 
                  name="correo" 
                  required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold small text-secondary ps-3">Contraseña</label>
              <div class="input-group position-relative">
                <span class="input-group-text rounded-start-pill ps-3">
                  <i class="bi bi-key-fill text-warning"></i>
                </span>
                <input 
                  #passwordInput 
                  type="password" 
                  class="form-control rounded-end-pill py-2" 
                  placeholder="••••••••"
                  [(ngModel)]="password" 
                  name="password" 
                  required
                  style="padding-right: 40px;"> <span class="eye-toggle" (click)="togglePassword()">
                  <i #eyeIcon class="bi bi-eye"></i>
                </span>
              </div>
            </div>

            <div class="d-flex justify-content-end mb-4">
              <a href="#" class="text-warning small fw-bold text-decoration-none" (click)="irARecuperar($event)">
                ¿Olvidaste tu contraseña?
              </a>
            </div>

            <div class="d-grid gap-3">
              <button type="submit" class="btn btn-login" [disabled]="loggingIn">
                {{ loggingIn ? 'Ingresando...' : 'INGRESAR AHORA' }} 
                <i class="bi bi-arrow-right-short" *ngIf="!loggingIn"></i>
              </button>
              
              <div class="text-center text-muted small my-1">¿No tienes cuenta?</div>

              <button type="button" class="btn btn-outline-dark rounded-pill fw-bold" (click)="registrar()">
                Crear una cuenta nueva
              </button>
            </div>

          </form>
        </div>

      </div>
    </div>

  </div>
</div>
